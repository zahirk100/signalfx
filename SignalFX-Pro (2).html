function ema(src,len){const k=2/(len+1),out=[src[0]];for(let i=1;i<src.length;i++)out.push(src[i]*k+out[i-1]*(1-k));return out;}
function calcRSI(src){const p=14,out=new Array(src.length).fill(50);if(src.length<p+2)return out;let ag=0,al=0;for(let i=1;i<=p;i++){const d=src[i]-src[i-1];d>0?ag+=d:al-=d;}ag/=p;al/=p;out[p]=al===0?100:100-100/(1+ag/al);for(let i=p+1;i<src.length;i++){const d=src[i]-src[i-1];ag=(ag*(p-1)+Math.max(d,0))/p;al=(al*(p-1)+Math.max(-d,0))/p;out[i]=al===0?100:100-100/(1+ag/al);}return out;}
function calcMACD(src){const e12=ema(src,12),e26=ema(src,26);const line=src.map((_,i)=>e12[i]-e26[i]);const sig=ema(line,9);return{line,sig,hist:line.map((v,i)=>v-sig[i])};}
function calcBB(src,p=20){return src.map((_,i)=>{if(i<p-1)return null;const sl=src.slice(i-p+1,i+1),mn=sl.reduce((a,b)=>a+b,0)/p;const sd=Math.sqrt(sl.reduce((s,v)=>s+(v-mn)**2,0)/p);return{up:mn+2*sd,mid:mn,lo:mn-2*sd};});}
function calcATR(cd,p=14){const tr=cd.map((c,i)=>{if(!i)return c.h-c.l;const pv=cd[i-1];return Math.max(c.h-c.l,Math.abs(c.h-pv.c),Math.abs(c.l-pv.c));});let a=tr.slice(0,p).reduce((x,y)=>x+y,0)/p;return tr.map((t,i)=>{if(i<p)return a;a=(a*(p-1)+t)/p;return a;});}
function calcSR(cd){const W=Math.min(5,Math.floor(cd.length/10));let res=cd[0].h,sup=cd[0].l;for(let i=W;i<cd.length-W;i++){if(cd.slice(i-W,i+W+1).every(c=>cd[i].h>=c.h))res=Math.max(res,cd[i].h);if(cd.slice(i-W,i+W+1).every(c=>cd[i].l<=c.l))sup=Math.min(sup,cd[i].l);}if(!res){const hs=[...cd.map(c=>c.h)].sort((a,b)=>b-a);res=hs[Math.floor(hs.length*.05)];}if(!sup){const ls=[...cd.map(c=>c.l)].sort((a,b)=>a-b);sup=ls[Math.floor(ls.length*.05)];}return{res,sup};}
function calcPat(cd){const P=[],n=cd.length;if(n<4)return P;const c0=cd[n-1],c1=cd[n-2],c2=cd[n-3];const b0=Math.abs(c0.c-c0.o)||1e-9,r0=(c0.h-c0.l)||1e-9;const b1=Math.abs(c1.c-c1.o)||1e-9,r1=(c1.h-c1.l)||1e-9;const a=(n,w,bias)=>P.push({n,w,bias});if(b0/r0<.10)a('Doji',0,'neu');if(c0.c>c0.o&&(c0.o-c0.l)>b0*2&&(c0.h-c0.c)<b0*.8)a('Hammer',20,'bull');if(c0.c<c0.o&&(c0.h-c0.o)>b0*2&&(c0.c-c0.l)<b0*.8)a('Shooting Star',20,'bear');if(c1.c<c1.o&&c0.c>c0.o&&c0.c>c1.o&&c0.o<c1.c)a('Bull Engulfing',24,'bull');if(c1.c>c1.o&&c0.c<c0.o&&c0.c<c1.o&&c0.o>c1.c)a('Bear Engulfing',24,'bear');if(c2.c<c2.o&&b1/r1<.3&&c0.c>c0.o&&c0.c>(c2.o+c2.c)/2)a('Morning Star',28,'bull');if(c2.c>c2.o&&b1/r1<.3&&c0.c<c0.o&&c0.c<(c2.o+c2.c)/2)a('Evening Star',28,'bear');if(c0.c>c0.o&&c1.c>c1.o&&c2.c>c2.o&&c0.c>c1.c&&c1.c>c2.c)a('3 Soldiers',22,'bull');if(c0.c<c0.o&&c1.c<c1.o&&c2.c<c2.o&&c0.c<c1.c&&c1.c<c2.c)a('3 Crows',22,'bear');if((c0.o-c0.l)>(c0.h-c0.c)*3&&b0/r0<.35)a('Pin Bar Bull',18,'bull');if((c0.h-c0.o)>(c0.c-c0.l)*3&&b0/r0<.35)a('Pin Bar Bear',18,'bear');return P;}

// REBUILT SIGNAL ENGINE: EMA 20/50/200, requires 3+ categories, trend aligned, wider SL
function analyze(pair,cd){
  if(!cd||cd.length<55)return null;
  const src=cd.map(c=>c.c),n=src.length;
  const px=src[n-1],ppx=src[n-2];
  const E20=ema(src,20),E50=ema(src,50),E200=ema(src,200);
  const RSI=calcRSI(src);const MC=calcMACD(src);const BB=calcBB(src);const ATR=calcATR(cd);
  const{res,sup}=calcSR(cd);const PATS=calcPat(cd);
  const e20=E20[n-1],e50=E50[n-1],e200=E200[n-1];
  const rsi=RSI[n-1],rsiP=RSI[n-2];
  const mh=MC.hist[n-1],mhP=MC.hist[n-2],ml=MC.line[n-1],ms=MC.sig[n-1];
  const bb=BB[n-1];const atr=ATR[n-1];
  if(!atr||atr<1e-8||!isFinite(rsi)||!isFinite(e20))return null;
  const avgR=cd.slice(-8).reduce((s,c)=>s+(c.h-c.l),0)/8;
  if(avgR<atr*.30)return null;
  const above200=px>e200,below200=px<e200;
  const sessBonus=isActive()?8:0;
  const sessMult=isActive()?1.0:.75;
  let bull=0,bear=0;const bullC=new Set(),bearC=new Set();const bt=[],br=[];
  const aB=(cat,pts,lbl)=>{bull+=pts;bullC.add(cat);bt.push(lbl);};
  const aR=(cat,pts,lbl)=>{bear+=pts;bearC.add(cat);br.push(lbl);};
  const emaBull=e20>e50&&e50>e200,emaBear=e20<e50&&e50<e200;
  if(emaBull&&above200)        aB('trend',30,'EMA Bull Trend');
  else if(emaBear&&below200)   aR('trend',30,'EMA Bear Trend');
  else if(e20>e50&&above200)   aB('trend',16,'EMA Cross ↑');
  else if(e20<e50&&below200)   aR('trend',16,'EMA Cross ↓');
  else if(e20>e50)             aB('trend',8,'EMA20>50');
  else if(e20<e50)             aR('trend',8,'EMA20<50');
  if(rsi<28)                   aB('mom',25,'RSI Oversold');
  else if(rsi>72)              aR('mom',25,'RSI Overbought');
  else if(emaBull&&above200){if(rsi>=45&&rsi<=72)aB('mom',16,'RSI Trend');else if(rsi<45)aB('mom',20,'RSI Pullback');}
  else if(emaBear&&below200){if(rsi>=28&&rsi<=55)aR('mom',16,'RSI Trend');else if(rsi>55)aR('mom',20,'RSI Pullback');}
  else{if(rsi<40)aB('mom',12,'RSI Low');else if(rsi>60)aR('mom',12,'RSI High');}
  if(isFinite(rsiP)){if(rsi>rsiP&&rsi<55)bull+=3;if(rsi<rsiP&&rsi>45)bear+=3;}
  const xUp=mhP!==undefined&&mhP<=0&&mh>0,xDn=mhP!==undefined&&mhP>=0&&mh<0;
  if(xUp)                          aB('macd',20,'MACD Cross ↑');
  else if(xDn)                     aR('macd',20,'MACD Cross ↓');
  else if(ml>ms&&mh>0&&mh>mhP)    aB('macd',14,'MACD Bull');
  else if(ml<ms&&mh<0&&mh<mhP)    aR('macd',14,'MACD Bear');
  else if(ml>0&&ml>ms)             aB('macd',6,'MACD+');
  else if(ml<0&&ml<ms)             aR('macd',6,'MACD-');
  if(bb){
    if(px<bb.lo&&above200)         aB('bb',15,'BB Oversold');
    else if(px>bb.up&&below200)    aR('bb',15,'BB Overbought');
    else if(px<bb.lo)              aB('bb',10,'BB Lo');
    else if(px>bb.up)              aR('bb',10,'BB Hi');
    else if(px>bb.mid&&emaBull)    aB('bb',5,'Above BB Mid');
    else if(px<bb.mid&&emaBear)    aR('bb',5,'Below BB Mid');
  }
  const brkD=atr*.3,tchD=atr*.7;
  if(px>res+brkD&&ppx<=res+brkD)             aB('sr',14,'Breakout ↑');
  else if(px<sup-brkD&&ppx>=sup-brkD)        aR('sr',14,'Breakdown ↓');
  else if(Math.abs(px-sup)<tchD&&above200)   aB('sr',8,'Support Hold');
  else if(Math.abs(px-res)<tchD&&below200)   aR('sr',8,'Resistance Hold');
  PATS.forEach(p=>{if(p.bias==='bull'){bull+=p.w;bullC.add('pat');bt.push(p.n);}else if(p.bias==='bear'){bear+=p.w;bearC.add('pat');br.push(p.n);}else{bull=Math.max(0,bull-4);bear=Math.max(0,bear-4);}});
  if(Math.abs(bull-bear)<15)return null;
  const dir=bull>bear?'BUY':'SELL';
  const raw=dir==='BUY'?bull:bear,cats=dir==='BUY'?bullC.size:bearC.size;
  if(cats<MIN_CATS)return null;
  // Hard trend alignment block
  if(dir==='BUY'&&below200&&!emaBull)return null;
  if(dir==='SELL'&&above200&&!emaBear)return null;
  const adj=Math.round(raw*sessMult)+sessBonus;
  const conf=Math.min(95,Math.max(45,Math.round(40+(adj/115)*56)));
  if(conf<G.conf)return null;
  const pip=pair.pip,slD=atr*SL_M,tp1D=atr*TP1_M,tp2D=atr*TP2_M;
  const slPips=Math.round(slD/pip);
  if(slPips<pair.minSL)return null; // SL too tight — reject
  const tags=(dir==='BUY'?bt:br).slice(0,5);
  const ttl={'5min':180,'15min':480,'1h':1440,'4h':4320}[G.tf]||480;
  return{id:Math.random().toString(36).slice(2),pair:pair.key,lbl:pair.lbl,flag:pair.flag,dec:pair.dec,pip,dir,entry:px,sl:dir==='BUY'?px-slD:px+slD,tp1:dir==='BUY'?px+tp1D:px-tp1D,tp2:dir==='BUY'?px+tp2D:px-tp2D,conf,rsi,rr:(tp1D/slD).toFixed(1),slPips,tp1Pips:Math.round(tp1D/pip),bull,bear,cats,tags,tf:G.tf,time:new Date(),status:'ACTIVE',ttlMin:ttl,sess:getSess().n,tp1Hit:false,candleCount:0,highSince:px,lowSince:px};
}

function sigAge(s){const m=Math.round((Date.now()-new Date(s.time).getTime())/60000);if(m<1)return'Zojuist';if(m<60)return m+'m';return Math.round(m/60)+'u';}
function sigProg(s){return Math.min(100,Math.round((Date.now()-new Date(s.time).getTime())/60000/s.ttlMin*100));}
function isExp(s){return(Date.now()-new Date(s.time).getTime())/60000>s.ttlMin;}
function shouldReplace(ex,nw){if(!ex)return true;if(ex.dir!==nw.dir)return true;if(isExp(ex))return true;if(nw.conf>ex.conf+10)return true;return false;}

async function scan(initial=false){
  if(G.scanning)return;G.scanning=true;
  for(const pair of PAIRS){
    const k=pair.key+G.tf;
    const cd=await fetchCandles(pair,G.tf,120);
    G.cd[k]=cd;
    if(cd.length){const last=cd[cd.length-1].c,first=cd[0].c;G.ppx[pair.key]=G.px[pair.key];G.px[pair.key]=last;G.chg[pair.key]=(last-first)/first*100;}
    updateTick(pair);
    const nw=analyze(pair,cd);
    const ex=G.sigs.find(s=>s.pair===pair.key&&s.status==='ACTIVE');
    if(nw){
      if(shouldReplace(ex,nw)){if(ex){ex.status='EXPIRED';addLog(ex);}G.sigs=G.sigs.filter(s=>!(s.pair===pair.key&&s.status==='ACTIVE'));G.sigs.unshift(nw);if(!initial){showToast(nw);pushNotify(nw);}}
    }else{if(ex&&isExp(ex)){closeSig(ex,ex.tp1Hit?'TP1':'EXPIRED',G.px[pair.key]);}}
  }
  saveSigs();G.scanning=false;render();
}

async function priceTick(){
  for(const pair of PAIRS){
    if(G.demo){G.ppx[pair.key]=G.px[pair.key];G.px[pair.key]*=1+(Math.random()-.5)*pair.vol*.05;G.chg[pair.key]+=(Math.random()-.5)*.008;}
    else{const p=await fetchPrice(pair);if(p&&p>.001){G.ppx[pair.key]=G.px[pair.key];G.px[pair.key]=p;}}
    updateTick(pair);
    const k=pair.key+G.tf;
    if(G.cd[k]?.length){const last=G.cd[k][G.cd[k].length-1],np=G.px[pair.key];G.cd[k][G.cd[k].length-1]={...last,c:np,h:Math.max(last.h,np),l:Math.min(last.l,np)};}
    trackSig(pair);
  }
  drawChart();
}

function trackSig(pair){
  const sig=G.sigs.find(s=>s.pair===pair.key&&s.status==='ACTIVE');
  if(!sig)return;
  const px=G.px[pair.key];if(!px||!sig.entry)return;
  const isBuy=sig.dir==='BUY';
  sig.highSince=Math.max(sig.highSince||px,px);
  sig.lowSince =Math.min(sig.lowSince||px,px);
  sig.candleCount=(sig.candleCount||0)+1;
  const slActive=sig.candleCount>=MIN_CD; // Wait before SL can fire
  // TP2
  const tp2hit=isBuy?sig.highSince>=sig.tp2:sig.lowSince<=sig.tp2;
  if(tp2hit){closeSig(sig,'TP2',sig.tp2);return;}
  // TP1
  const tp1hit=isBuy?sig.highSince>=sig.tp1:sig.lowSince<=sig.tp1;
  if(tp1hit&&!sig.tp1Hit){sig.tp1Hit=true;sig.tp1HitTime=new Date();sig.tp1HitPrice=sig.tp1;saveSigs();pushNotify({...sig,lbl:sig.lbl+' TP1 ✓'});if(G.tab==='sig')render();}
  // SL (only after MIN_CD candles to avoid noise)
  if(slActive){
    const slhit=isBuy?sig.lowSince<=sig.sl:sig.highSince>=sig.sl;
    if(slhit){closeSig(sig,sig.tp1Hit?'TP1':'SL',sig.tp1Hit?sig.tp1:sig.sl);return;}
  }
  // TTL
  if(isExp(sig)){closeSig(sig,sig.tp1Hit?'TP1':'EXPIRED',px);}
}

function closeSig(sig,closedBy,closePrice){
  const now=new Date(),dur=Math.round((now-new Date(sig.time).getTime())/60000);
  const isBuy=sig.dir==='BUY';
  const pips=Math.round((isBuy?closePrice-sig.entry:sig.entry-closePrice)/sig.pip*10)/10;
  const slPipsD=Math.abs(sig.sl-sig.entry)/sig.pip;
  const rrAch=slPipsD>0?+(Math.abs(closePrice-sig.entry)/sig.pip/slPipsD).toFixed(2):0;
  const isWin=closedBy==='TP1'||closedBy==='TP2';
  const status=isWin?'WIN':closedBy==='SL'?'LOSS':'EXPIRED';
  const closed={...sig,status,closedBy,closePrice,closeTime:now,durationMin:dur,pips,rrAchieved:rrAch};
  G.sigs=G.sigs.filter(s=>!(s.pair===sig.pair&&s.status==='ACTIVE'));
  addLog(closed);saveSigs();saveLog();
  if(closedBy!=='EXPIRED'){pushNotify({...sig,lbl:`${sig.lbl} ${isWin?'WIN ✓':'LOSS ✗'}`,entry:closePrice});showToast({...sig,lbl:`${sig.lbl} ${isWin?'WIN ✓':'LOSS ✗'}`,entry:closePrice,id:sig.id+'_c'});}
  if(G.tab==='sig'||G.tab==='sta'||G.tab==='his')render();
  if(G.pair===sig.pair)drawChart();
}
function addLog(sig){if(G.log.find(s=>s.id===sig.id))return;G.log.unshift(sig);if(G.log.length>500)G.log=G.log.slice(0,500);}

function drawChart(){
  const cv=document.getElementById('cv');if(!cv)return;
  const k=G.pair+G.tf,cd=G.cd[k];if(!cd?.length)return;
  const dpr=devicePixelRatio||1,W=cv.offsetWidth||320,H=155;
  cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';
  const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);
  const sl=cd.slice(-60);
  const mn=Math.min(...sl.map(c=>c.l)),mx=Math.max(...sl.map(c=>c.h));
  const rng=mx-mn||1,pad=10,cw=W/sl.length;
  const py=v=>pad+(H-pad*2)*(1-(v-mn)/rng);
  const pair=PAIRS.find(p=>p.key===G.pair);
  const sig=G.sigs.find(s=>s.pair===G.pair&&s.status==='ACTIVE');
  // Background zones
  if(sig){
    if(sig.tp1>=mn&&sig.tp1<=mx){ctx.fillStyle=sig.dir==='BUY'?'#00c89606':'#f0204006';const ey=py(sig.entry),tp1y=py(sig.tp1);ctx.fillRect(0,Math.min(ey,tp1y),W,Math.abs(ey-tp1y));}
    if(sig.sl>=mn&&sig.sl<=mx){ctx.fillStyle='#f020400a';const ey=py(sig.entry),sly=py(sig.sl);ctx.fillRect(0,Math.min(ey,sly),W,Math.abs(ey-sly));}
  }
  ctx.strokeStyle='#ffffff05';ctx.lineWidth=1;
  [.2,.4,.6,.8].forEach(f=>{const y=pad+(H-pad*2)*f;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();ctx.fillStyle='#1e3a52';ctx.font='6px monospace';ctx.fillText((mn+rng*(1-f)).toFixed(pair?.dec||5),2,y-2);});
  const src=sl.map(c=>c.c),bbl=calcBB(src);
  let bs=false;ctx.beginPath();bbl.forEach((b,i)=>{if(!b)return;const x=i*cw+cw/2;bs?ctx.lineTo(x,py(b.up)):ctx.moveTo(x,py(b.up));bs=true;});for(let i=bbl.length-1;i>=0;i--){if(!bbl[i])continue;ctx.lineTo(i*cw+cw/2,py(bbl[i].lo));}ctx.closePath();ctx.fillStyle='#0080f008';ctx.fill();
  [[ema(src,20),'#e0b000',1.5],[ema(src,50),'#0080f0',1.5],[ema(src,200),'#f02040',.8]].forEach(([arr,col,lw])=>{ctx.beginPath();ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.globalAlpha=.75;arr.forEach((v,i)=>{const x=i*cw+cw/2;i?ctx.lineTo(x,py(v)):ctx.moveTo(x,py(v));});ctx.stroke();ctx.globalAlpha=1;});
  const{res,sup_}=calcSR(sl);const sr_=calcSR(sl);
  ctx.setLineDash([5,5]);[[sr_.res,'#f0204060'],[sr_.sup,'#00c89660']].forEach(([v,col])=>{ctx.strokeStyle=col;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,py(v));ctx.lineTo(W,py(v));ctx.stroke();});ctx.setLineDash([]);
  sl.forEach((c,i)=>{const bull=c.c>=c.o,col=bull?'#00c896':'#f02040';const x=i*cw+cw/2,bw=Math.max(2,cw*.7);const bt_=py(Math.max(c.o,c.c)),bb_=py(Math.min(c.o,c.c)),bh=Math.max(1.5,bb_-bt_);ctx.strokeStyle=col;ctx.lineWidth=Math.max(.8,cw*.12);ctx.beginPath();ctx.moveTo(x,py(c.h));ctx.lineTo(x,py(c.l));ctx.stroke();ctx.fillStyle=bull?'#00c8964a':'#f020404a';ctx.strokeStyle=col;ctx.lineWidth=.8;ctx.fillRect(x-bw/2,bt_,bw,bh);ctx.strokeRect(x-bw/2,bt_,bw,bh);});
  if(sig){
    const dL=(price,col,label)=>{if(price<mn||price>mx)return;const y=py(price);ctx.setLineDash([4,4]);ctx.strokeStyle=col+'aa';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle=col;ctx.font='bold 7px monospace';ctx.fillText(label+' '+price.toFixed(sig.dec),4,y-3);};
    const col=sig.dir==='BUY'?'#00c896':'#f02040';
    dL(sig.entry,col,sig.dir);dL(sig.sl,'#f02040','SL');dL(sig.tp1,'#00c896','TP1');if(sig.tp2>=mn&&sig.tp2<=mx)dL(sig.tp2,'#00c89688','TP2');
  }
  const lp=sl[sl.length-1].c;ctx.strokeStyle='#ffffff18';ctx.lineWidth=1;ctx.setLineDash([2,5]);ctx.beginPath();ctx.moveTo(0,py(lp));ctx.lineTo(W,py(lp));ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#ffffffdd';ctx.font='bold 7px monospace';ctx.fillText(lp.toFixed(pair?.dec||5),W-54,py(lp)-3);
  document.getElementById('czl').textContent=`${pair?.flag||''} ${pair?.lbl||G.pair} · ${TFL[G.tf]||G.tf}`;
}

    <div class="sr"><div><div class="slb">SL = ${SL_M}× ATR</div><div class="ssb">Breder SL = minder valse stops</div></div><span style="font-size:9px;color:var(--mu)">${SL_M}×</span></div>
    <div class="sr"><div><div class="slb">TP1 = ${TP1_M}× ATR → RR 1:${(TP1_M/SL_M).toFixed(1)}</div></div><span style="font-size:9px;color:var(--mu)">${TP1_M}×</span></div>
    <div class="sr"><div><div class="slb">TP2 = ${TP2_M}× ATR → RR 1:${(TP2_M/SL_M).toFixed(1)}</div></div><span style="font-size:9px;color:var(--mu)">${TP2_M}×</span></div>
    <div class="sr"><div><div class="slb">Min. ${MIN_CATS} van 6 categories</div><div class="ssb">Meerdere indicators moeten bevestigen</div></div><span style="font-size:9px;color:var(--mu)">${MIN_CATS}</span></div>
    <div class="sr"><div><div class="slb">SL wacht ${MIN_CD} candles</div><div class="ssb">Voorkomt premature stop-outs door noise</div></div><span style="font-size:9px;color:var(--mu)">${MIN_CD}</span></div>
  </div>
  <div class="sb"><div class="sb-t">📱 iPhone</div><div style="font-size:9.5px;color:var(--mu);line-height:2.3">1. Open in <strong style="color:var(--tx)">Safari</strong><br>2. Delen ↑ → <strong style="color:var(--tx)">"Zet op beginscherm"</strong><br>3. Tik <strong style="color:var(--tx)">Voeg toe</strong> ⚡</div></div>
  <div class="sb"><div class="sb-t">⚠️ Disclaimer</div><div style="font-size:8px;color:var(--mu);line-height:1.9">SignalFX is een analyse hulpmiddel — geen financieel advies. Trading brengt risico's mee.</div></div>`;
}

async function reqPush(){if(!('Notification'in window)){alert('Push niet beschikbaar.');return;}const p=await Notification.requestPermission();if(p==='granted'){G.tog.push=true;render();}else alert('Geen toestemming. Sta notificaties toe in Safari instellingen.');}
function doTog(k,btn){G.tog[k]=!G.tog[k];btn?.classList?.toggle?.('on',G.tog[k]);if(k==='autoref')startTimers();else render();}
function doReset(){if(confirm('Opnieuw inloggen?')){localStorage.clear();location.reload();}}
async function pickPair(key){G.pair=key;document.querySelectorAll('.ti').forEach(e=>e.classList.remove('on'));document.getElementById('ti-'+key)?.classList.add('on');const pair=PAIRS.find(p=>p.key===key);const cd=await fetchCandles(pair,G.tf,120);G.cd[key+G.tf]=cd;if(cd.length){G.px[key]=cd[cd.length-1].c;updateTick(pair);}drawChart();}
async function setTF(btn){G.tf=btn.dataset.tf;document.querySelectorAll('.tfb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');G.sigs=G.sigs.filter(s=>s.tf===G.tf&&s.status==='ACTIVE');document.getElementById('CNT').innerHTML='<div class="ldg"><span class="sp">⟳</span> Laden...</div>';await scan(false);drawChart();render();}
function startTimers(){G.ivs.forEach(clearInterval);G.ivs=[];G.ivs.push(setInterval(priceTick,G.demo?3000:30000));if(G.tog.autoref)G.ivs.push(setInterval(()=>scan(false),5*60*1000));}
function pushNotify(sig){if(!G.tog.push||!('Notification'in window)||Notification.permission!=='granted')return;try{new Notification(`⚡ SignalFX — ${sig.lbl}`,{body:`${sig.dir==='BUY'?'🟢':'🔴'} ${sig.dir} @ ${sig.entry.toFixed(sig.dec)} · ${sig.conf}% · RR 1:${sig.rr}`,tag:sig.id});}catch(e){}}
let TT;
function showToast(sig){if(sig.id===G.lastToast)return;G.lastToast=sig.id;document.getElementById('th').textContent=`🔔 ${sig.lbl}`;document.getElementById('tb').textContent=`${sig.dir==='BUY'?'🟢':'🔴'} ${sig.dir} @ ${sig.entry.toFixed(sig.dec)} · ${sig.conf}%`;const t=document.getElementById('toast');t.classList.add('show');clearTimeout(TT);TT=setTimeout(()=>t.classList.remove('show'),6000);}
function saveSigs(){try{ls('sfx_sigs',JSON.stringify(G.sigs.filter(s=>s.status==='ACTIVE').slice(0,10)));}catch(e){}}
function saveLog(){try{ls('sfx_log',JSON.stringify(G.log.slice(0,300)));}catch(e){}}
function setPill(cls,txt){const p=document.getElementById('pill'),t=document.getElementById('pt');if(!p||!t)return;p.className='pill '+cls;t.textContent=txt;}
function ls(k,v){try{if(v===undefined)return localStorage.getItem(k);localStorage.setItem(k,v);}catch(e){return null;}}
window.addEventListener('resize',drawChart);
</script>
